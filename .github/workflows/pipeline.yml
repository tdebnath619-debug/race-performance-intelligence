name: F1 Analysis Pipeline
on:
  push:
    branches: [main]
jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pandas numpy matplotlib scipy
      - name: Run F1 pipeline
        run: python run_f1_analysis.py
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: f1-reports
          path: reports/
